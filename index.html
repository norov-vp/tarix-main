let allQuestions = questions;
let selectedQuestions = [];

let current = 0;
let score = 0;

let time = 4800;
let timer;
let paused = false;

const container =
document.getElementById("questions");

function loadPart(part){

    if(part===1)
        selectedQuestions =
        allQuestions.slice(0,50);

    if(part===2)
        selectedQuestions =
        allQuestions.slice(50,100);

    if(part===3)
        selectedQuestions =
        allQuestions.slice(100,150);

    if(part===4)
        selectedQuestions =
        allQuestions.slice(150,195);
        
    if(part===4)
        selectedQuestions =
        allQuestions.slice(195,221);


    document.getElementById("menu")
    .style.display="none";

    document.getElementById("pauseBtn")
    .style.display="inline-block";

    document.getElementById("exitBtn")
    .style.display="inline-block";

    renderQuestions();

    startTest();
}

function renderQuestions(){

    container.innerHTML="";

    selectedQuestions.forEach((q,i)=>{

        let div =
        document.createElement("div");

        div.className="question";

        let html=`<h3>${q.q}</h3>`;

        q.options.forEach((opt,j)=>{

            html+=`
            <label>
                <input type="radio"
                name="q${i}"
                value="${j}">
                ${opt}
            </label><br><br>
            `;

        });

        div.innerHTML=html;

        container.appendChild(div);

    });

}

function startTest(){

    current=0;
    score=0;

    document.getElementById("timer")
    .style.display="block";

    document
    .querySelectorAll(".question")[0]
    .style.display="block";

    startTimer();

}

function startTimer(){

    timer=setInterval(()=>{

        time--;

        let min =
        Math.floor(time/60);

        let sec =
        time%60;

        document
        .getElementById("timer")
        .innerText=
        `${min}:${sec<10?"0"+sec:sec}`;

        if(time<=0){

            clearInterval(timer);

            finishTest();

        }

    },1000);

}

document
.getElementById("pauseBtn")
.onclick=()=>{

    if(!paused){

        clearInterval(timer);

        paused=true;

        pauseBtn.innerText=
        "▶ Davom ettirish";

    }else{

        startTimer();

        paused=false;

        pauseBtn.innerText=
        "⏸ To'xtatish";

    }

};

document
.getElementById("exitBtn")
.onclick=()=>{

    if(confirm("Testdan chiqilsinmi?")){

        location.reload();

    }

};

container.addEventListener(
"change",(e)=>{

    let qDivs=
    document.querySelectorAll(".question");

    let index=
    [...qDivs].indexOf(
    e.target.closest(".question"));

    let selected=
    Number(e.target.value);

    let feedback=
    document.getElementById(
    "feedback");

    if(
      selected===
      selectedQuestions[index]
      .correct[0]
    ){

        score++;

        feedback.innerHTML=
        '<span class="correct">✅ To‘g‘ri</span>';

    }else{

        feedback.innerHTML=
        '<span class="wrong">❌ Noto‘g‘ri</span>';

    }

    setTimeout(()=>{

        feedback.innerHTML="";

        next();

    },700);

});

function next(){

    let qDivs=
    document.querySelectorAll(".question");

    qDivs[current]
    .style.display="none";

    current++;

    if(current<qDivs.length){

        qDivs[current]
        .style.display="block";

    }else{

        finishTest();

    }

}

function finishTest(){

    clearInterval(timer);

    let total=
    selectedQuestions.length;

    let percent=
    Math.round(
    score*100/total);

    let grade="";

    if(percent>=28)
        grade="O'tdingiz";
    else if(percent<=28)
        grade="Yiqildiz";

    document
    .getElementById("questions")
    .innerHTML="";

    document
    .getElementById("feedback")
    .innerHTML="";

    document
    .getElementById("result")
    .innerHTML=`

    <h2>Test tugadi</h2>

    <p>Ball:
    ${score}/${total}</p>

    <p>Foiz:
    ${percent}%</p>

    <p>Baho:
    <b>${grade}</b></p>

    <button onclick="location.reload()">
    🔄 Qayta boshlash
    </button>

    `;
}

</script>
